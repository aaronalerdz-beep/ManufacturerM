<div class="flex">
    
     <div style="width: 60vh; height: auto; margin: auto;">
        <canvas baseChart
        [data]="lineChartData"
        [options]="lineChartOptions"
        [type]="'line'">
        </canvas>
    </div>
    <div style="width: 60vh; margin: auto;">
        <canvas baseChart
        [data]="BarChartData"
        [options]="barChartOptions"
        [type]="'bar'">
        </canvas>
    </div>

    <div style="width: auto; margin: auto;">
        <canvas baseChart
        
        [data]="doughnutChartData"
        [options]="doughnutChartOptions"
        [plugins]="doughnutChartPlugins"
        [type]="'doughnut'">
        </canvas>
    </div>
</div>
<div class="flex align-middle items-center justify-between mt-20 m-5">
    <div class="bg-pink-100  rounded-xl">
        <h1 class="text-2xl m-2"> Number of orders Finished </h1>
        <h2 class="m-2 text-center text-6xl">{{totalOrdersCount()}}</h2>
    </div>
    <div class="bg-pink-100  rounded-xl">
        <h1 class="text-2xl m-2"> Number of Parts Finished </h1>
        <h2 class="m-2 text-center text-6xl">{{totalFinishCount()}}</h2>
    </div>
    <div class="bg-pink-100  rounded-xl">
        <h1 class="text-2xl m-2"> % Part Finished per Order</h1>
        <h2 class="m-2 text-center text-6xl">%{{procentCount()}}</h2>
    </div>
    <div class="bg-pink-100  rounded-xl">
        <h1 class="text-2xl m-2"> The total part finished today</h1>
        <h2 class="m-2 text-center text-6xl"><p>{{ stats()?.totalPartsToday || 0 }} </p></h2>
    </div>
</div>
